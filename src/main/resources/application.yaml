spring:
  application:
    name: relink
  config:
    import: optional:classpath:./secret/.env[.properties]

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL:jdbc:mysql://localhost:3306/${DB_SCHEMA:mohae}?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USER_NAME:root}
    password: ${DB_PASSWORD:1234}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:3s}

  sql:
    init:
      mode: ${SPRING_SQL_INIT_MODE:always}
      schema-locations: classpath:db/schema-init.sql

  batch:
    job:
      enabled: false
    jdbc:
      initialize-schema: never

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update} # none, create, create-drop, update, validate
    properties:
      hibernate:
        format_sql: true

batch:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${BATCH_DB_URL:jdbc:mysql://localhost:3306/${BATCH_SCHEMA:mohae_batch}?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${BATCH_DB_USER_NAME:${DB_USER_NAME:root}}
    password: ${BATCH_DB_PASSWORD:${DB_PASSWORD:1234}}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace


springdoc:
  server-url: http://localhost:8080
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

jwt:
  secret: ${JWT_SECRET:relink-local-development-secret-key-should-be-changed}
  access-token-expiration-seconds: 9000
  refresh-token-expiration-seconds: 1209600

cors:
  allowed:
    paths: "/**"
    origins:
      - http://localhost:3000
      - http://localhost:5173
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
    headers:
      - "*"
    exposed-headers:
      - Authorization
    max-age: 3600
    credentials: false

social:
  kakao:
    user-info-uri: https://kapi.kakao.com/v2/user/me
  google:
    client-ids:
      web: ${GOOGLE_CLIENT_ID_WEB}
      android: ${GOOGLE_CLIENT_ID_ANDROID}
      ios: ${GOOGLE_CLIENT_ID_IOS}

notification:
  web-push:
    enabled: ${WEB_PUSH_ENABLED:true}
    subject: ${WEB_PUSH_SUBJECT:mailto:admin@example.com}
    public-key: ${WEB_PUSH_PUBLIC_KEY:}
    private-key: ${WEB_PUSH_PRIVATE_KEY:}
  redis:
    dedup-prefix: ${NOTIFICATION_DEDUP_PREFIX:notification:dedup}
    dedup-ttl-seconds: ${NOTIFICATION_DEDUP_TTL_SECONDS:300}
  outbox:
    enabled: ${NOTIFICATION_OUTBOX_ENABLED:true}
    batch-size: ${NOTIFICATION_OUTBOX_BATCH_SIZE:50}
    fixed-delay-millis: ${NOTIFICATION_OUTBOX_FIXED_DELAY_MILLIS:5000}

chat:
  storage:
    type: ${CHAT_STORAGE_TYPE:local}
    local:
      root-path: ${CHAT_LOCAL_STORAGE_ROOT:build/local-storage}
      public-base-url: ${CHAT_LOCAL_PUBLIC_BASE_URL:http://localhost:8080/uploads}
      upload-expires-in: ${CHAT_LOCAL_UPLOAD_EXPIRES_IN:300}
  redis:
    stream-key: ${CHAT_REDIS_STREAM_KEY:chat:events}
  outbox:
    enabled: ${CHAT_OUTBOX_ENABLED:true}
    fixed-delay-millis: ${CHAT_OUTBOX_FIXED_DELAY_MILLIS:1000}

database:
  schema:
    app: ${DB_SCHEMA:mohae}
    batch: ${BATCH_SCHEMA:mohae_batch}
