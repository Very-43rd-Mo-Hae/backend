name: mohae

services:
  app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}
    container_name: mohae-backend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8082}:8080"
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      DB_URL: ${DB_URL:-jdbc:mysql://mysql:3306/mohae?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      DB_USER_NAME: ${DB_USER_NAME:-mohae}
      DB_PASSWORD: ${DB_PASSWORD}
      BATCH_DB_URL: ${BATCH_DB_URL:-jdbc:mysql://mysql:3306/mohae_backend_batch?createDatabaseIfNotExist=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
      BATCH_DB_USER_NAME: ${BATCH_DB_USER_NAME:-mohae}
      BATCH_DB_PASSWORD: ${BATCH_DB_PASSWORD}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_SQL_INIT_MODE: ${SPRING_SQL_INIT_MODE:-always}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}
      CHAT_LOCAL_STORAGE_ROOT: /app/storage/chat
      CHAT_LOCAL_PUBLIC_BASE_URL: ${CHAT_LOCAL_PUBLIC_BASE_URL:-http://localhost:8082/uploads}
    volumes:
      - mohae_chat_storage:/app/storage/chat

  redis:
    image: redis:7.4-alpine
    container_name: mohae-redis
    profiles:
      - internal-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PUBLIC_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - mohae_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mohae_chat_storage:
  mohae_redis_data:
